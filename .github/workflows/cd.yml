name: Deploy on Docker Hub

on:
  # cuando se haga push a main
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: code-checkout
        uses: actions/checkout@v4
      # Se encarga de iniciar sesion en Docker hub
      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build n push
        uses: docker/build-push-action@v7
        with:
          context: lab02/
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lab02:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lab02:${{ github.sha }}